name: Feature Request
description: Suggest a new feature for FinderGit
title: "[Feature]: "
labels: ["enhancement", "app"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make FinderGit better? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's frustrating about the current behavior?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
      placeholder: It would be great if FinderGit could...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds?

  - type: textarea
    id: screenshots
    attributes:
      label: Mockups or screenshots
      description: If you have any visual ideas, share them here.
