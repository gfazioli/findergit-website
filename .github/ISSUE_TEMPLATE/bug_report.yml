name: Bug Report
description: Report a bug in FinderGit for macOS
title: "[Bug]: "
labels: ["bug", "app"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below to help us fix it.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the bug?
      placeholder: |
        1. Open FinderGit
        2. Add root folder '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: FinderGit version
      description: Which version of FinderGit are you using? (FinderGit → About)
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: macos
    attributes:
      label: macOS version
      options:
        - macOS 15 (Sequoia)
        - macOS 26 (Tahoe)
        - Other
    validations:
      required: true

  - type: dropdown
    id: chip
    attributes:
      label: Mac chip
      options:
        - Apple Silicon (M1/M2/M3/M4)
        - Intel
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant information (git version, specific repo setup, etc.)
